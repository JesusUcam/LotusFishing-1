<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Landing Docker</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111827;
      color: white;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .card {
      max-width: 720px;
      padding: 48px;
      border-radius: 24px;
      background: #1f2937;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }

    p {
      font-size: 20px;
      color: #d1d5db;
    }

    .badge {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 18px;
      border-radius: 999px;
      background: #2563eb;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Mi landing en Docker 🚀</h1>
    <p>Servida con Nginx, construida como imagen propia y desplegada desde Portainer.</p>
    <span class="badge">v1.0.0</span>
  </main>
</body>
</html>
